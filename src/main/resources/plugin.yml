name: Reliquary
version: '${version}'
main: com.nyrrine.reliquary.Reliquary
api-version: '1.21'
author: Nyrrine
description: Custom relic weapons.
commands:
  reliquary:
    description: Manage and hand out relics.
    usage: /reliquary help
  cogito:
    description: The Cogito extraction testbed.
    usage: /cogito help
    aliases: [ext, co]
  prescript:
    description: The Index — prescripts and their tally.
    usage: /prescript help
  abeautifulvoice:
    description: Become Carmen — name, skin and voice.
    usage: /abeautifulvoice form [player]
    permission: reliquary.admin
    aliases: [abv]
  carmen:
    description: Speak a line as Carmen, without transforming.
    usage: /carmen <message>
    permission: reliquary.admin
permissions:
  reliquary.admin:
    description: Access to Reliquary's relic commands.
    default: op
  reliquary.weaver:
    description: May issue prescripts and rule on them. The Index's own role index is the real
      mechanism (admins grant it with /prescript weaver add); this node is honoured as well, so a
      permissions plugin works without a code change if one is ever installed.
    default: false
